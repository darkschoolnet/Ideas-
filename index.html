<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSN — IDEA BOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    /* ─── RESET & BASE ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:        #0a0a0a;
      --bg-surface:     #111111;
      --bg-card:        #161616;
      --bg-input:       #0e0e0e;
      --border-subtle:  #222222;
      --border-mid:     #333333;
      --border-active:  #555555;
      --text-primary:   #c8c8c8;
      --text-secondary: #666666;
      --text-muted:     #3a3a3a;
      --text-white:     #e8e8e8;
      --accent:         #5b8cff;
      --accent-glow:    rgba(91,140,255,0.15);
      --danger:         #ff4444;
      --danger-glow:    rgba(255,68,68,0.12);
      --success:        #44cc88;
      --warning:        #ffaa33;
      --admin:          #cc44ff;
      --admin-glow:     rgba(204,68,255,0.15);
    }

    html { font-size: 15px; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.4) 2px,
        rgba(0,0,0,0.4) 4px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* Grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ──────────────────────────────────── */
    .page-wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }

    /* ─── HEADER ──────────────────────────────────── */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .site-logo {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-white);
    }
    .site-logo span { color: var(--accent); }

    .header-user {
      display: flex; align-items: center; gap: 12px;
    }
    .user-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-secondary);
      padding: 4px 10px;
      border: 1px solid var(--border-subtle);
    }
    .user-badge strong { color: var(--accent); }

    /* ─── PAGE TITLE ──────────────────────────────── */
    .page-title {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 3.2rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-white);
      line-height: 1;
      margin-bottom: 6px;
    }
    .page-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* ─── CYCLE BANNER ────────────────────────────── */
    .cycle-banner {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      flex-wrap: wrap;
      animation: cardIn 0.4s ease both;
    }
    .cycle-banner::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 40px; height: 40px;
      border-top: 2px solid var(--warning);
      border-left: 2px solid var(--warning);
    }
    .cycle-banner::after {
      content: '';
      position: absolute; bottom: 0; right: 0;
      width: 40px; height: 40px;
      border-bottom: 2px solid var(--border-mid);
      border-right: 2px solid var(--border-mid);
    }

    .cycle-info { flex: 1; min-width: 180px; }
    .cycle-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--warning);
      margin-bottom: 4px;
    }
    .cycle-name {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-white);
    }
    .cycle-dates {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;
    }

    .cycle-countdown {
      display: flex; gap: 16px; align-items: flex-end;
    }
    .cd-block { text-align: center; }
    .cd-num {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 2rem; color: var(--text-white); line-height: 1; display: block;
    }
    .cd-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted);
    }

    .cycle-stats {
      display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
    }
    .stat-pill {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary);
      padding: 3px 10px;
      border: 1px solid var(--border-subtle);
    }
    .stat-pill strong { color: var(--accent); }

    /* ─── TABS ────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 28px;
    }
    .tab-btn {
      position: relative;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 0.95rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary);
      background: none; border: none;
      padding: 12px 22px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab-btn::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--text-white); }
    .tab-btn.active::after { transform: scaleX(1); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

    /* ─── SUBMIT IDEA BLOCK ───────────────────────── */
    .submit-block {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 24px;
      margin-bottom: 28px;
      position: relative;
      animation: cardIn 0.4s ease 0.05s both;
    }
    .submit-block::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 30px; height: 30px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }

    .block-title {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-white);
      margin-bottom: 18px;
    }
    .block-title span { color: var(--accent); margin-right: 8px; }

    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }

    .form-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-secondary);
    }

    input, select, textarea {
      background: var(--bg-input);
      border: 1px solid var(--border-mid);
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--bg-card); }

    .char-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; color: var(--text-muted); text-align: right;
    }

    /* ─── BUTTONS ─────────────────────────────────── */
    .btn {
      position: relative; overflow: hidden;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-white);
      background: transparent;
      border: 1px solid var(--border-mid);
      padding: 10px 22px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn span { position: relative; z-index: 1; }
    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { border-color: var(--accent); }

    .btn-danger::before { background: var(--danger); }
    .btn-danger:hover { border-color: var(--danger); }
    .btn-success::before { background: var(--success); }
    .btn-success:hover { border-color: var(--success); }
    .btn-admin::before { background: var(--admin); }
    .btn-admin:hover { border-color: var(--admin); }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    /* ─── FILTER BAR ──────────────────────────────── */
    .filter-bar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .filter-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border-subtle);
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip:hover, .filter-chip.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }

    /* ─── IDEA CARDS ──────────────────────────────── */
    .ideas-list { display: flex; flex-direction: column; gap: 14px; }

    .idea-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 18px 18px 18px 80px;
      display: flex; flex-direction: column; gap: 8px;
      animation: cardIn 0.35s ease both;
      transition: border-color 0.2s;
    }
    .idea-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 24px; height: 24px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .idea-card:hover { border-color: var(--border-mid); }
    .idea-card:hover::before { opacity: 1; }

    /* Vote column */
    .vote-col {
      position: absolute; left: 0; top: 0; bottom: 0; width: 64px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      border-right: 1px solid var(--border-subtle);
    }
    .vote-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; line-height: 1;
      color: var(--text-muted);
      padding: 5px;
      transition: color 0.15s, transform 0.15s;
    }
    .vote-btn:hover { transform: scale(1.25); }
    .vote-btn.up:hover, .vote-btn.up.voted { color: var(--success); }
    .vote-btn.down:hover, .vote-btn.down.voted { color: var(--danger); }
    .vote-count {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.15rem; color: var(--text-primary);
      min-width: 28px; text-align: center;
    }
    .vote-count.pos { color: var(--success); }
    .vote-count.neg { color: var(--danger); }

    .idea-header { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .idea-title {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-white); flex: 1;
    }

    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid;
      white-space: nowrap;
    }
    .tag-game  { color: var(--accent); border-color: rgba(91,140,255,0.4); background: var(--accent-glow); }
    .tag-app   { color: var(--success); border-color: rgba(68,204,136,0.4); background: rgba(68,204,136,0.08); }
    .tag-tool  { color: var(--warning); border-color: rgba(255,170,51,0.4); background: rgba(255,170,51,0.08); }
    .tag-other { color: var(--text-secondary); border-color: var(--border-mid); }

    .idea-desc {
      font-size: 0.88rem; color: var(--text-secondary); line-height: 1.5;
    }

    .idea-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .idea-meta strong { color: var(--text-secondary); }

    /* Winner badge */
    .winner-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--warning);
      border: 1px solid rgba(255,170,51,0.4);
      background: rgba(255,170,51,0.08);
      padding: 2px 8px;
    }

    /* ─── PAST CYCLES ─────────────────────────────── */
    .past-cycle-card {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      margin-bottom: 16px;
      animation: cardIn 0.35s ease both;
    }
    .past-cycle-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 28px; height: 28px;
      border-top: 2px solid var(--text-muted);
      border-left: 2px solid var(--text-muted);
    }

    .past-cycle-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .past-cycle-title {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-white);
    }
    .past-cycle-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .past-cycle-body {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid var(--border-subtle);
    }
    .past-cycle-body.open { display: block; }

    /* ─── LEADERBOARD ─────────────────────────────── */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Barlow Condensed', sans-serif;
    }
    .lb-table th {
      font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-subtle);
    }
    .lb-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.88rem; color: var(--text-primary);
    }
    .lb-table tr:hover td { background: var(--bg-surface); }
    .lb-rank {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.2rem; color: var(--text-muted); text-align: center;
    }
    .lb-rank.gold   { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }

    /* ─── LOGIN PROMPT ────────────────────────────── */
    .login-prompt {
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-secondary);
    }
    .login-prompt a {
      color: var(--accent); text-decoration: none;
    }

    /* ─── EMPTY STATE ─────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.3; }

    /* ─── TOAST ───────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 10000;
    }
    .toast {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 10px 18px;
      border: 1px solid;
      animation: slideIn 0.3s ease;
      min-width: 220px;
    }
    .toast.success { color: var(--success); border-color: rgba(68,204,136,0.4); background: rgba(68,204,136,0.08); }
    .toast.error   { color: var(--danger);  border-color: rgba(255,68,68,0.4); background: var(--danger-glow); }
    .toast.info    { color: var(--accent);  border-color: rgba(91,140,255,0.4); background: var(--accent-glow); }

    /* ─── ADMIN PANEL ─────────────────────────────── */
    .admin-trigger {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer; background: none; border: none;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .admin-trigger:hover { color: var(--admin); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 5000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      padding: 28px;
      max-width: 540px; width: 90%;
      position: relative;
      animation: cardIn 0.3s ease;
    }
    .modal::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 32px; height: 32px;
      border-top: 2px solid var(--admin);
      border-left: 2px solid var(--admin);
    }

    .modal-title {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--admin);
      margin-bottom: 20px;
    }

    .modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.2rem;
    }
    .modal-close:hover { color: var(--text-primary); }

    .admin-form .form-group { margin-bottom: 14px; }

    .separator {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 20px 0;
    }

    /* ─── LOADING ─────────────────────────────────── */
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    .loading-center {
      display: flex; justify-content: center; padding: 40px;
    }

    /* ─── ANIMATIONS ──────────────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── UTILS ───────────────────────────────────── */
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .justify-end { justify-content: flex-end; }
    .text-muted { color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; }
    .no-cycle-msg {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 24px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- ─── TOAST CONTAINER ───────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── ADMIN MODAL ───────────────────────────────── -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">

// ─── CRYPTO ───────────────────────────────────────────
function generateSalt() {
  const b = new Uint8Array(32); crypto.getRandomValues(b);
  return Array.from(b).map(x => x.toString(16).padStart(2,'0')).join('');
}
async function hashPassword(password, saltHex) {
  const enc  = new TextEncoder();
  const salt = new Uint8Array(saltHex.match(/.{2}/g).map(h => parseInt(h,16)));
  const key  = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name:'PBKDF2', hash:'SHA-256', salt, iterations:200000 }, key, 256);
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(password, saltHex, storedHash) {
  return (await hashPassword(password, saltHex)) === storedHash;
}

function renderCycleBanner() {
  const wrap = document.getElementById('cycleBannerWrap');

  wrap.innerHTML = `
    <div class="cycle-banner">

        <div class="cycle-name">${activeCycle.title}</div>
        <div class="cycle-dates">${fmt(activeCycle.start_date)} — ${fmt(activeCycle.end_date)}</div>

      <div class="cycle-stats">
        <div class="stat-pill" id="statIdeas">IDEEN: <strong>—</strong></div>
        <div class="stat-pill" id="statVotes">VOTES: <strong>—</strong></div>
      </div>
    </div>`;

  startCountdown(end);
}

function startCountdown(end) {
  function tick() {
    const now  = Date.now();
    const diff = end - now;
    if (diff <= 0) {
      document.getElementById('countdown').innerHTML = `<span style="color:var(--danger);font-family:Impact,sans-serif;font-size:1.1rem;text-transform:uppercase;letter-spacing:.06em">ABGELAUFEN</span>`;
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const el = document.getElementById('countdown');
    if (!el) return;
    el.innerHTML = [['d',d],['h',h],['m',m],['s',s]].map(([l,v]) =>
      `<div class="cd-block"><span class="cd-num">${String(v).padStart(2,'0')}</span><span class="cd-label">${l}</span></div>`
    ).join('');
  }
  tick();
  setInterval(tick, 1000);
}

function fmt(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
}

// ─── LOAD IDEAS ───────────────────────────────────────
async function loadIdeas() {
  if (!activeCycle) return;

  const { data, error } = await db
    .from('dsn_ideas')
    .select('*, dsn_idea_votes(vote)')
    .eq('cycle_id', activeCycle.id)
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }

  allIdeas = (data || []).map(idea => ({
    ...idea,
    score: (idea.dsn_idea_votes || []).reduce((s, v) => s + v.vote, 0),
    vote_count: (idea.dsn_idea_votes || []).length
  }));

  // Update stats
  const totalVotes = allIdeas.reduce((s, i) => s + i.vote_count, 0);
  const sI = document.getElementById('statIdeas');
  const sV = document.getElementById('statVotes');
  if (sI) sI.innerHTML = `IDEEN: <strong>${allIdeas.length}</strong>`;
  if (sV) sV.innerHTML = `VOTES: <strong>${totalVotes}</strong>`;

  renderIdeas();
}

// ─── RENDER IDEAS ─────────────────────────────────────
function renderIdeas() {
  const container = document.getElementById('currentIdeas');
  let ideas = [...allIdeas];

  if (activeFilter !== 'all') ideas = ideas.filter(i => i.category === activeFilter);
  ideas.sort((a, b) => b.score - a.score);

  if (ideas.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">💡</div>Noch keine Ideen — sei der Erste!</div>`;
    return;
  }

  container.innerHTML = ideas.map((idea, idx) => renderIdeaCard(idea, idx)).join('');
}

function renderIdeaCard(idea, idx) {
  const score    = idea.score;
  const uv       = userVotes[idea.id] || 0;
  const upClass  = uv === 1  ? 'up voted'   : 'up';
  const downClass= uv === -1 ? 'down voted' : 'down';
  const scoreClass = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
  const catTag   = { game:'tag-game', app:'tag-app', tool:'tag-tool', other:'tag-other' }[idea.category] || 'tag-other';
  const catLabel = { game:'🎮 Spiel', app:'📱 App', tool:'🔧 Tool', other:'💡 Sonstige' }[idea.category] || 'Sonstige';
  const canVote  = currentUser && (new Date(activeCycle?.end_date) > new Date());

  const delay = Math.min(idx * 0.04, 0.4);
  return `
    <div class="idea-card" style="animation-delay:${delay}s">
      <div class="vote-col">
        <button class="vote-btn ${upClass}" ${canVote ? `onclick="vote('${idea.id}',1)"` : 'disabled title="Nicht eingeloggt"'}>▲</button>
        <span class="vote-count ${scoreClass}">${score}</span>
        <button class="vote-btn ${downClass}" ${canVote ? `onclick="vote('${idea.id}',-1)"` : 'disabled title="Nicht eingeloggt"'}>▼</button>
      </div>
      <div class="idea-header">
        <span class="idea-title">${escHtml(idea.title)}</span>
        <span class="tag ${catTag}">${catLabel}</span>
        ${isAdmin ? `<button class="btn btn-danger" style="padding:2px 10px;font-size:0.65rem" onclick="adminDeleteIdea('${idea.id}')"><span>DEL</span></button>` : ''}
      </div>
      <div class="idea-desc">${escHtml(idea.description)}</div>
      <div class="idea-meta">
        <span>VON <strong>${escHtml(idea.username)}</strong></span>
        <span>${timeAgo(idea.created_at)}</span>
        <span>${idea.vote_count} VOTE${idea.vote_count !== 1 ? 'S' : ''}</span>
      </div>
    </div>`;
}

// ─── VOTE ─────────────────────────────────────────────
async function vote(ideaId, val) {
  if (!currentUser) return toast('Bitte zuerst einloggen.', 'error');

  const current = userVotes[ideaId] || 0;

  if (current === val) {
    // Remove vote
    await db.from('dsn_idea_votes').delete()
      .eq('idea_id', ideaId).eq('user_id', currentUser.id);
    delete userVotes[ideaId];
  } else {
    // Upsert vote
    await db.from('dsn_idea_votes').upsert(
      { idea_id: ideaId, user_id: currentUser.id, vote: val },
      { onConflict: 'idea_id,user_id' }
    );
    userVotes[ideaId] = val;
  }

  await loadIdeas();
}

  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  const { data: cycles } = await db
    .from('dsn_idea_cycles')
    .select('*')
    .in('status', ['closed', 'finished'])
    .order('end_date', { ascending: false });

  if (!cycles || cycles.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🗂</div>Noch keine abgeschlossenen Zyklen.</div>`;
    return;
  }

  container.innerHTML = cycles.map((c, i) => `
    <div class="past-cycle-card" style="animation-delay:${i*0.05}s">
      <div class="past-cycle-header" onclick="togglePastCycle('pc${c.id}', '${c.id}')">
        <span class="past-cycle-title">${escHtml(c.title)}</span>
        <span class="past-cycle-meta">${fmt(c.start_date)} — ${fmt(c.end_date)} ▾</span>
      </div>
      <div class="past-cycle-body" id="pc${c.id}"></div>

}

async function togglePastCycle(domId, cycleId) {
  const body = document.getElementById(domId);
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.past-cycle-body').forEach(b => b.classList.remove('open'));
  if (isOpen) return;

  body.classList.add('open');
  body.innerHTML = '<div class="loading-center" style="padding:20px"><div class="spinner"></div></div>';

  const { data } = await db
    .from('dsn_ideas')
    .select('*, dsn_idea_votes(vote)')
    .eq('cycle_id', cycleId);

  const ideas = (data || []).map(idea => ({
    ...idea,
    score: (idea.dsn_idea_votes || []).reduce((s, v) => s + v.vote, 0)
  })).sort((a, b) => b.score - a.score);

  if (ideas.length === 0) {
    body.innerHTML = '<p class="text-muted" style="padding:16px 0">Keine Ideen in diesem Zyklus.</p>';
    return;
  }

  body.innerHTML = `
    <div class="mt-12" style="display:flex;flex-direction:column;gap:10px">
      ${ideas.map((idea, idx) => `
        <div class="idea-card" style="padding-left:80px">
          <div class="vote-col">
            <span class="vote-count ${idea.score>0?'pos':idea.score<0?'neg':''}">${idea.score}</span>
          </div>
          <div class="idea-header">
            <span class="idea-title">${escHtml(idea.title)}</span>
            ${idx === 0 ? '<span class="winner-badge">🏆 WINNER</span>' : ''}
            <span class="tag ${{ game:'tag-game', app:'tag-app', tool:'tag-tool', other:'tag-other' }[idea.category]||'tag-other'}">${{ game:'🎮 Spiel', app:'📱 App', tool:'🔧 Tool', other:'💡 Sonstige' }[idea.category]||'?'}</span>
          </div>
          <div class="idea-desc">${escHtml(idea.description)}</div>
          <div class="idea-meta"><span>VON <strong>${escHtml(idea.username)}</strong></span></div>
        </div>`).join('')}
    </div>`;
}

// ─── LEADERBOARD ──────────────────────────────────────
async function loadLeaderboard() {
  const container = document.getElementById('leaderboardContent');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  // Get all ideas with votes
  const { data } = await db
    .from('dsn_ideas')
    .select('username, title, dsn_idea_votes(vote)');

  if (!data || data.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏆</div>Noch keine Daten.</div>`;
    return;
  }

  // Aggregate by user
  const userStats = {};
  data.forEach(idea => {
    const score = (idea.dsn_idea_votes || []).reduce((s, v) => s + v.vote, 0);
    if (!userStats[idea.username]) userStats[idea.username] = { ideas: 0, totalScore: 0, best: 0 };
    userStats[idea.username].ideas++;
    userStats[idea.username].totalScore += score;
    if (score > userStats[idea.username].best) userStats[idea.username].best = score;
  });

  const sorted = Object.entries(userStats)
    .map(([u, s]) => ({ username: u, ...s }))
    .sort((a, b) => b.totalScore - a.totalScore);

  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const rankSymbol = i => ['🥇','🥈','🥉'][i] || (i + 1);

  container.innerHTML = `
    <table class="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Ideen</th>
          <th>Gesamtscore</th>
          <th>Bester Score</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((u, i) => `
          <tr style="animation:cardIn .35s ease ${i*0.04}s both">
            <td class="lb-rank ${rankClass(i)}">${rankSymbol(i)}</td>
            <td>${escHtml(u.username)}</td>
            <td>${u.ideas}</td>
            <td style="color:${u.totalScore>0?'var(--success)':u.totalScore<0?'var(--danger)':'var(--text-primary)'}">${u.totalScore > 0 ? '+' : ''}${u.totalScore}</td>
            <td style="color:var(--accent)">${u.best > 0 ? '+' : ''}${u.best}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function checkAdminLogin() {
  const pw = document.getElementById('adminPwInput').value;
  if (!pw) return;

  let storedHash = localStorage.getItem(ADMIN_PW_KEY);
  let storedSalt = localStorage.getItem(ADMIN_SALT_KEY);

  // First time: initialize with default password
  if (!storedHash) {
    storedSalt = generateSalt();
    storedHash = await hashPassword(DEFAULT_ADMIN, storedSalt);
    localStorage.setItem(ADMIN_SALT_KEY, storedSalt);
    localStorage.setItem(ADMIN_PW_KEY, storedHash);
  }

  const ok = await verifyPassword(pw, storedSalt, storedHash);
  if (!ok) return toast('Falsches Passwort.', 'error');

  isAdmin = true;
  closeAdmin();
  toast('Admin eingeloggt.', 'success');
  openAdminPanel();
}

      <button class="btn" onclick="openCloseCycleForm()"><span>ZYKLUS ABSCHLIESSEN</span></button>
      <button class="btn btn-danger" onclick="openChangePw()"><span>PASSWORT ÄNDERN</span></button>
      <button class="btn" onclick="closeAdmin();isAdmin=false;toast('Admin ausgeloggt.','info')"><span>AUSLOGGEN</span></button>
    </div>`;
  document.getElementById('adminModal').classList.add('open');
}

function openCreateCycleForm() {
  const today = new Date().toISOString().split('T')[0];
  const inWeek = new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0];
  document.getElementById('adminModalContent').innerHTML = `
    <div class="admin-form">
      <div class="form-group">
        <label class="form-label">Zyklus-Name</label>
        <input id="cycTitle" type="text" placeholder="z.B. Sommer 2025" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start</label>
          <input id="cycStart" type="date" value="${today}" />
        </div>
        <div class="form-group">
          <label class="form-label">Ende</label>
          <input id="cycEnd" type="date" value="${inWeek}" />
        </div>
      </div>
      <div class="flex gap-8 justify-end mt-12">
        <button class="btn" onclick="openAdminPanel()"><span>ZURÜCK</span></button>
        <button class="btn btn-success" onclick="createCycle()"><span>ERSTELLEN</span></button>
      </div>
    </div>`;
}

async function createCycle() {
  const title = document.getElementById('cycTitle').value.trim();
  const start = document.getElementById('cycStart').value;
  const end   = document.getElementById('cycEnd').value;

  if (!title || !start || !end) return toast('Alle Felder ausfüllen.', 'error');
  if (new Date(start) >= new Date(end)) return toast('Ende muss nach Start liegen.', 'error');

  // Close any currently active cycle
  await db.from('dsn_idea_cycles').update({ status: 'closed' }).eq('status', 'active');

  const { error } = await db.from('dsn_idea_cycles').insert({ title, start_date: start, end_date: end, status: 'active' });
  if (error) return toast('Fehler: ' + error.message, 'error');

  toast('Zyklus erstellt!', 'success');
  closeAdmin();
  await loadActiveCycle();
}

async function openCloseCycleForm() {
  if (!activeCycle) return toast('Kein aktiver Zyklus.', 'info');
  document.getElementById('adminModalContent').innerHTML = `
    <p style="font-family:'Barlow Condensed',sans-serif;color:var(--text-secondary);margin-bottom:16px">
      Zyklus <strong style="color:var(--text-white)">${escHtml(activeCycle.title)}</strong> jetzt abschließen?
    </p>
    <div class="flex gap-8 justify-end">
      <button class="btn" onclick="openAdminPanel()"><span>ABBRECHEN</span></button>
      <button class="btn btn-danger" onclick="closeCycle()"><span>ABSCHLIESSEN</span></button>
    </div>`;
}

async function closeCycle() {
  const { error } = await db.from('dsn_idea_cycles').update({ status: 'closed' }).eq('id', activeCycle.id);
  if (error) return toast('Fehler: ' + error.message, 'error');
  toast('Zyklus abgeschlossen.', 'info');
  closeAdmin();
  await loadActiveCycle();
}

async function openChangePw() {
  document.getElementById('adminModalContent').innerHTML = `
    <div class="admin-form">
      <div class="form-group"><label class="form-label">Neues Passwort</label><input type="password" id="newPw1" /></div>
      <div class="form-group"><label class="form-label">Wiederholen</label><input type="password" id="newPw2" /></div>
      <div class="flex gap-8 justify-end mt-12">
        <button class="btn" onclick="openAdminPanel()"><span>ZURÜCK</span></button>
        <button class="btn btn-admin" onclick="saveNewPw()"><span>SPEICHERN</span></button>
      </div>
    </div>`;
}

async function saveNewPw() {
  const p1 = document.getElementById('newPw1').value;
  const p2 = document.getElementById('newPw2').value;
  if (!p1) return toast('Passwort eingeben.', 'error');
  if (p1 !== p2) return toast('Passwörter stimmen nicht überein.', 'error');
  const salt = generateSalt();
  const hash = await hashPassword(p1, salt);
  localStorage.setItem(ADMIN_SALT_KEY, salt);
  localStorage.setItem(ADMIN_PW_KEY, hash);
  toast('Passwort gespeichert.', 'success');
  closeAdmin();
}

async function adminDeleteIdea(id) {
  if (!confirm('Idee wirklich löschen?')) return;
  await db.from('dsn_idea_votes').delete().eq('idea_id', id);
  await db.from('dsn_ideas').delete().eq('id', id);
  toast('Idee gelöscht.', 'info');
  await loadIdeas();
}

function closeAdmin() {
  document.getElementById('adminModal').classList.remove('open');
}

// ─── HELPERS ─────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr);
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'GERADE EBEN';
  if (m < 60) return `VOR ${m} MIN`;
  const h = Math.floor(m / 60);
  if (h < 24) return `VOR ${h} STD`;
  return `VOR ${Math.floor(h/24)} TAGEN`;
}

// Close modal on backdrop click
document.getElementById('adminModal').addEventListener('click', function(e) {
  if (e.target === this) closeAdmin();
});

// ─── GO ───────────────────────────────────────────────
init();
</script>
